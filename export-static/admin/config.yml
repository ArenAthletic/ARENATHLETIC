# 1. Where your site files are
source: Export-static

# 2. Tell CloudCannon where to put the "built" version for the preview
output_dir: _site

# 3. Define your pages as a collection
collections_config:
  pages:
    path: ""
    output: true
    url: "/[path]"

# 4. Enable the Visual Editor by default
editor:
  default_view: visual
