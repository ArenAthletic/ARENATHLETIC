      contact_form_intro.heading:
        type: text
      contact_form_intro.copy:
        type: html
      contact_form_intro.button_label:
        type: text
      contact_form_intro.button_url:
        type: url
      ecosystem.links:
        type: array
        comment: "Ecosystem CTA links"

  # ── Product Page ──────────────────────────────────────────────
  data/pages/product.json:
    label: "Product Template"
    icon: shopping_bag
    _inputs:
      main_product.brand_label:
        type: text
      main_product.shipping_text:
