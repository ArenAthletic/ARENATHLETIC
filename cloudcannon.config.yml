# ─── AREN Athletic — CloudCannon Configuration ──────────────────────────────
# 
# Architecture:
#   CloudCannon edits → data/pages/*.json & data/site/site.json
#   Build runs        → python3 build_static.py
#   Build reads JSON  → generates HTML to dist/
#   Visual Editor     → previews dist/ output
#
# Route mapping:
#   data/pages/home.json       → dist/index.html            → /
#   data/pages/about.json      → dist/about/index.html      → /about/
#   data/pages/contact.json    → dist/contact/index.html     → /contact/
#   data/pages/services.json   → dist/services/index.html    → /services/
#   data/pages/collection.json → dist/collection/index.html  → /collection/
#   data/pages/product.json    → dist/product/index.html     → /product/
#   data/pages/training.json   → dist/training/index.html    → /training/
#   data/pages/street-miles.json → dist/street-miles-nyc/index.html → /street-miles-nyc/
# ─────────────────────────────────────────────────────────────────────────────

source: .

paths:
  uploads: assets
  static: assets
  data: data

# ─── Collections ─────────────────────────────────────────────────────────────
collections_config:

  # Page content — the primary editing target
  # Each JSON file controls one page's content.
  # CloudCannon Data Editor shows named inputs for each field.
  data_pages:
    path: data/pages
    output: false
    icon: article
    _enabled_editors:
      - data
      - visual

  # Global site settings (header, footer, navigation)
  data_site:
    path: data/site
    output: false
    icon: settings
    _enabled_editors:
      - data

  # Built output pages — for Visual Editor preview only
  # These are generated by the build script, not edited directly.
  pages:
    path: dist
    output: true
    url: "/[relative_base_path]/{slug}/"
    glob:
      - "**/*.html"
      - "!assets/**"
    icon: web
    _enabled_editors:
      - visual

# ─── Collection Groups (sidebar) ────────────────────────────────────────────
collection_groups:
  - heading: Edit Pages
    collections:
      - data_pages
  - heading: Site Settings
    collections:
      - data_site
  - heading: Preview
    collections:
      - pages

# ─── Global Editables ───────────────────────────────────────────────────────
_editables:
  text:
    block: true
    inline: true
  rich_text:
    block: true
    inline: false
  image:
    type: image
    image_size_attributes: true
  link:
    attributes:
      href:
        type: text

# ─── Input types ─────────────────────────────────────────────────────────────
_inputs:
  # Image fields
  fallback_image_url:
    type: image
    comment: "Hero/section background image"
  logo_image:
    type: image
    comment: "Brand logo image"

  # Rich text
  copy:
    type: html
    comment: "Rich text content (supports <p>, <strong>, <em>)"
  text:
    type: html
    comment: "Rich text content"

  # Select fields
  button_style:
    type: select
    options:
      values:
        - primary
        - outline
        - outline-white
    comment: "Button visual style"
  style:
    type: select
    options:
      values:
        - primary
        - outline
        - outline-white
    comment: "Link button visual style"
  theme_mode:
    type: select
    options:
      values:
        - light
        - dark
  dark_theme:
    type: switch
    comment: "Enable dark theme for this section"

  # Numeric
  min_height:
    type: number
    comment: "Minimum section height in pixels"
  heading_width:
    type: number
    comment: "Max heading width in ch units"
  copy_width:
    type: number
    comment: "Max copy text width in ch units"
  limit:
    type: number
    comment: "Maximum number of items to show"

  # Color
  background_color:
    type: color
    comment: "Card background color"

  # URL fields
  url:
    type: url
    comment: "Link URL (use /about/, /contact/, etc.)"
  link:
    type: url
    comment: "Link URL"
  button_url:
    type: url
    comment: "Button link URL"

  # Toggle
  show_price:
    type: switch
    comment: "Show product price"
  image_overlay:
    type: switch
    comment: "Enable image overlay"
  border_bottom:
    type: switch
  border_top:
    type: switch

# ─── Per-file config ─────────────────────────────────────────────────────────
# Each JSON file gets labeled, icon'd, and has its arrays/images configured
# so CloudCannon shows the right editor controls.

file_config:

  # ── Site Settings ─────────────────────────────────────────────
  data/site/site.json:
    label: "Site Settings"
    icon: settings
    _inputs:
      header.logo_image:
        type: image
      header.logo_alt:
        type: text
      header.logo_width:
        type: number
      navigation.links:
        type: array
        comment: "Main navigation links"
      footer.logo_image:
        type: image
      footer.ecosystem_links:
        type: array
        comment: "Footer ecosystem links"
      footer.access_links:
        type: array
        comment: "Footer access links"
      footer.email_address:
        type: email

  # ── Home Page ─────────────────────────────────────────────────
  data/pages/home.json:
    label: "Home Page"
    icon: home
    _inputs:
      hero.fallback_image_url:
        type: image
        comment: "Hero background image"
      hero.heading:
        type: text
        comment: "Main hero headline"
      hero.copy:
        type: textarea
        comment: "Hero description text"
      hero.primary_button_label:
        type: text
      hero.secondary_button_label:
        type: text
      hero.microcopy_one:
        type: text
      hero.microcopy_two:
        type: text
      hero.overlay_gradient:
        type: text
        comment: "CSS gradient for hero overlay"
      hero.min_height:
        type: number
      collection_categories.categories:
        type: array
        comment: "Shopping category cards"
      featured_collection.fallback_cards:
        type: array
        comment: "Featured product cards"
      image_with_text.stats:
        type: array
        comment: "Brand philosophy stats"
      editorial_section.fallback_image_url:
        type: image
        comment: "Street Miles editorial image"
      editorial_section.stats:
        type: array
        comment: "Editorial stats"

  # ── About Page ────────────────────────────────────────────────
  data/pages/about.json:
    label: "About Page"
    icon: article
    _inputs:
      hero.fallback_image_url:
        type: image
      hero.heading:
        type: text
      hero.overlay_gradient:
        type: text
      intro.fallback_image_url:
        type: image
        comment: "Intro section side image"
      intro.copy:
        type: html
        comment: "Intro rich text content"
      intro.button_label:
        type: text
      intro.button_url:
        type: url
      body.copy:
        type: html
        comment: "Body rich text content"
      identity.fallback_image_url:
        type: image
        comment: "Identity section image"
      identity.copy:
        type: html
      values.cards:
        type: array
        comment: "Core values cards (Training Systems, Street Miles, Uniform)"
      values.dark_theme:
        type: switch
      cta.links:
        type: array
        comment: "CTA link buttons"
      cta.copy:
        type: html

  # ── Training Page ─────────────────────────────────────────────
  data/pages/training.json:
    label: "Training Page"
    icon: fitness_center
    _inputs:
      hero.fallback_image_url:
        type: image
      hero.heading:
        type: text
      hero.copy:
        type: textarea
      philosophy.cards:
        type: array
        comment: "Philosophy principle cards"
      philosophy.copy:
        type: textarea
      feature.fallback_image_url:
        type: image
        comment: "Feature section image"
      feature.heading:
        type: text
      feature.copy:
        type: textarea
      programs.links:
        type: array
        comment: "Program CTA links"
      who.cards:
        type: array
        comment: "Who trains cards"
      who.dark_theme:
        type: switch
      get_started.copy:
        type: textarea
      get_started.email:
        type: email
      get_started.button_label:
        type: text
      get_started.button_url:
        type: url

  # ── Services Page ─────────────────────────────────────────────
  data/pages/services.json:
    label: "Services Page"
    icon: dashboard
    _inputs:
      hero.fallback_image_url:
        type: image
      hero.heading:
        type: text
      hero.copy:
        type: textarea
      hero.dark_theme:
        type: switch
      services_list.cards:
        type: array
        comment: "Service offering cards (Individual, Group, etc.)"
      cta.heading:
        type: text
      cta.copy:
        type: html
      cta.button_label:
        type: text
      cta.button_url:
        type: url
      cta_links.links:
        type: array
        comment: "CTA link buttons"

  # ── Street Miles Page ─────────────────────────────────────────
  data/pages/street-miles.json:
    label: "Street Miles NYC"
    icon: directions_run
    _inputs:
      hero.fallback_image_url:
        type: image
      hero.heading:
        type: text
      hero.copy:
        type: textarea
      hero_cta.links:
        type: array
