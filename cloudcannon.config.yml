source: .

paths:
  uploads: assets
  static: assets
  data: data

# ─── Collections ─────────────────────────────────────────────────────────────
collections_config:

  # Rendered HTML pages — CloudCannon scans these for editable regions
  # path points to the build output directory (dist/)
  pages:
    path: dist
    output: true
    url: "/[relative_base_path]/[slug]/"
    icon: article
    _enabled_editors:
      - visual
      - content
      - data

  # JSON data files for structured content editing
  data_pages:
    path: data/pages
    output: false
    icon: article
    _enabled_editors:
      - data

  data_site:
    path: data/site
    output: false
    icon: settings
    _enabled_editors:
      - data

# ─── Global Editables ─────────────────────────────────────────────────────────
_editables:
  text:
    block: true
    inline: true
  rich_text:
    block: true
    inline: false
  image:
    type: image
    image_size_attributes: true
  link:
    attributes:
      href:
        type: text

# ─── Input types ──────────────────────────────────────────────────────────────
_inputs:
  image:
    type: image
  rich_text:
    type: html
  markdown:
    type: markdown
  button_style:
    type: select
    options:
      values:
        - primary
        - outline
        - outline-white
  theme_mode:
    type: select
    options:
      values:
        - light
        - dark

# ─── Per-file config ──────────────────────────────────────────────────────────
file_config:

  data/site/site.json:
    label: Site Settings
    icon: settings
    _editables:
      text: true
      image: true
    _inputs:
      header.logo_image:
        type: image
      footer.logo_image:
        type: image
      navigation.links:
        type: array
      footer.ecosystem_links:
        type: array
      footer.access_links:
        type: array

  data/pages/home.json:
    label: Home Page Content
    icon: home
    _editables:
      text: true
      image: true
    _inputs:
      hero.fallback_image_url:
        type: image
      featured_collection.fallback_cards:
        type: array
      image_with_text.stats:
        type: array
      collection_categories.categories:
        type: array
      editorial_section.stats:
        type: array

  data/pages/about.json:
    label: About Page Content
    icon: article
    _editables:
      text: true
      image: true
    _inputs:
      values.cards:
        type: array
      cta.links:
        type: array

  data/pages/training.json:
    label: Training Page Content
    icon: fitness_center
    _editables:
      text: true
      image: true
    _inputs:
      philosophy.cards:
        type: array
      programs.links:
        type: array
      who.cards:
        type: array

  data/pages/services.json:
    label: Services Page Content
    icon: dashboard
    _editables:
      text: true
      image: true
    _inputs:
      services_list.cards:
        type: array
      cta_links.links:
        type: array

  data/pages/street-miles.json:
    label: Street Miles Page Content
    icon: directions_run
    _editables:
      text: true
      image: true
    _inputs:
      protocol.cards:
        type: array
      chapter.cards:
        type: array
      quotes.cards:
        type: array
      access.links:
        type: array

  data/pages/contact.json:
    label: Contact Page Content
    icon: call
    _editables:
      text: true
      image: true
    _inputs:
      channels.cards:
        type: array
      social.links:
        type: array
      ecosystem.links:
        type: array

  data/pages/product.json:
    label: Product Content
    icon: shopping_bag
    _editables:
      text: true
    _inputs:
      related.fallback_cards:
        type: array

  data/pages/collection.json:
    label: Collection Content
    icon: grid_view
    _editables:
      text: true
    _inputs:
      collection_grid.philosophy_columns:
        type: array
      collection_grid.filters:
        type: array
      collection_grid.why_paragraphs:
        type: array
      collection_grid.meta_blocks:
        type: array
